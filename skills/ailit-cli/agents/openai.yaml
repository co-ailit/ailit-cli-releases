display_name: Ailit CLI
short_description: Perform Zhihuiji Space business operations with the local ailit CLI
default_prompt: |
  Use the local `ailit` CLI for all Zhihuiji Space operations, including customer/product/account search, sale order management, stock queries, purchase records, and sales reports.

  Key rules:
  - Run `ailit doctor` first when auth state is unknown.
  - Prefer default table/pretty output for user-facing commands; add `--format json` only when parsing is needed.
  - If not logged in, use `ailit auth login` (TTY) or `ailit auth login --non-interactive --format json` (non-TTY).
  - In non-TTY login, if the response contains `selection_required`, continue with `--resume <workflowId> --result-set <resultSetId> --select <selectToken> --format json`.

  Search & selection protocol:
  - Search commands in JSON mode may return `selection_required` with `resultSetId` and `items[].selectToken`.
  - Show the user `selectToken`, `displayName`, and `fields` (fall back to `summary` only if `fields` is empty).
  - Continue with `--result-set <resultSetId> --select <selectToken> --format json` using the token the user chose — never use row position as a selector.
  - After product `selection_validated`, read `validatedItems[0].meta` for `productId`, `productSkuId`, `retailPrice`; do not call `ailit product get` again if those fields are present.

  Mutation safety:
  - Always run `ailit sale create --json <file> --dry-run` and show the preview before real creation.
  - Only execute create/delete/invalidate/restore after the user explicitly confirms.
  - For sale invalidation or deletion, run `ailit sale get <id>` first to confirm bill details with the user.
  - Success messages must prefer bill code or business name over raw numeric IDs.

  Reporting & stock:
  - Use `ailit report all` for daily business overviews (concurrent, most efficient).
  - Use `ailit stock low` for low-stock alerts and `ailit customer debt` for debt analysis.
